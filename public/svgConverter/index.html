<!DOCTYPE html>
<html>
    <head>
        <title>SVG Converter</title>
        <style>
            * {
                font-family: sans-serif;
                border-radius: 1vw;
                margin: 0.5%;
            }
        </style>
    </head>

    <body style="display: flex; height: 90vh; justify-content: space-between;">
        <!--comment-->
        <!-- svg and drawing side-->
        <div style="flex: 3; display: flex; flex-direction: column;">
            <!-- svg input -->
            <div style="flex: 1; display: flex;">
                <textarea id="svgInput" style="flex: 3; resize: none;" placeholder="SVG markup..."></textarea>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <h2>SVG Controls</h2>

                    <label style="height: 20%; border: 1px solid #000000; display: flex; justify-content: center; align-items: center;">
                        Upload SVG
                        <input id="svgUpload" type="file" accept=".svg,image/svg+xml,.txt,text/plain" hidden>
                    </label>
                    
                </div>
            </div>
            <!-- drawing input-->
            <div style="flex: 1; display: flex;">
                <textarea id="drawingInput" style="flex: 3; resize: none;" placeholder="Floof drawing actions..."></textarea>
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                    <h2>Drawing Controls</h2>

                    <div style="height: 10%; display: flex; align-items: center;">
                        <label>Use Linebreaks</label>
                        <input style="width: 20%; height: 100%;" id="linebreakSetting" type="checkbox" value="Use Linebreaks">
                    </div>

                    <div style="height: 10%; display: flex; align-items: center;">
                        <label style="flex: 1;">Drawing Class</label>
                        <select style="flex: 1;" id="drawingClassSetting">
                            <option value="new s.H1()">new s.H1()</option>
                            <option value="new Drawing()">new Drawing()</option>
                            <option value="new floof.Drawing()">new floof.Drawing()</option>
                        </select>
                    </div>

                    <button style="height: 20%;" id="convertButton">Convert to Drawing</button>

                    <div style="height: 20%; display: flex;">
                        <button id="copyButton">Copy to Clipboard</button>
                        <button id="downloadTextButton">Download as .txt</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- the svg preview-->
        <div style="flex: 2; display: flex; flex-direction: column;">
            <h1 style="text-align: center;">Drawing Preview</h1>
            <canvas id="drawingPreview"></canvas>
        </div>
    </body>
    <script src="svgToDrawing.js"></script>
</html>
